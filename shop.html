<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nightshade Ark Shop</title>
    <link rel="stylesheet" href="css/styles.css">
    
</head>

<body>

<nav class="navbar">
    <a href="index.html" class="logo">
        <img src="images/logo-transparent.png" alt="Nightshade Logo">
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="rules.html">Rules</a></li>
    </ul>
</nav>

<header class="shop-header">
    <h1>Nightshade Ark Shop</h1>
</header>

<section class="shop-tabs">
    <a href="free-starter-kit.html">Starter Kit</a>
    <a href="herbivores.html">Herbivores</a>
    <a href="omnivores.html">Omnivores</a>
    <a href="carnivores.html">Carnivores</a>
    <a href="utility-special.html">Utility</a>
</section>

<section class="shop-section">
    <h2>How to Purchase</h2>
    <div class="info-card center">
        <p>Go to Discord → <strong>#shop-ticket</strong> channel.</p>
        <a href="https://discord.gg/8NeNgTQu6d" class="discord-button">Go to Discord</a>
    </div>
</section>

<!-- SHOPPING LIST -->
<div id="shop-hud">
    <button id="hud-toggle" onclick="toggleHud()">−</button>
    
    <div id="hud-content">
        <div style="padding: 35px 10px 10px 10px; background: rgba(255,255,255,0.05); border-bottom: 1px solid #333; margin-bottom: 10px;">
            <label style="font-size: 10px; color: #00ffcc; display: block; margin-bottom: 5px; font-weight: bold;">SELECT VARIANT:</label>
            <select id="variant-master" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 6px; font-size: 12px;">
                <option value="0">Original (Base Price)</option>
                <option value="2500">Tek (+2,500)</option>
                <option value="2500">Proto (+2,500)</option>
                <option value="2500">Myth (+2,500)</option>
                <option value="2500">Eerie (+2,500)</option>
            </select>
        </div>

        <div class="hud-header">
            <span>YOUR ORDER</span>
            <button onclick="clearCart()" class="clear-btn">Clear All</button>
        </div>
        <div id="cart-items-list"></div>
        </div>
</div>
<script>
    let cart = JSON.parse(localStorage.getItem('arkShopCart')) || [];

    function renderCart() {
        const list = document.getElementById('cart-items-list');
        if (!list) return;
        list.innerHTML = '';
        if (cart.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#555; font-size:12px; margin-top:10px;">Select items to begin</p>';
        }
        cart.forEach(item => {
            list.innerHTML += `<div class="cart-row">
                <div class="item-controls">
                    <button class="qty-btn" onclick="updateQuantity('${item.name}', -1)">-</button>
                    <input type="number" class="qty-input" value="${item.qty}" oninput="handleManualQty('${item.name}', this.value, this)">
                    <button class="qty-btn" onclick="updateQuantity('${item.name}', 1)">+</button>
                </div>
                <span class="item-name">${item.name}</span>
                <span class="item-price-display">${(item.price * item.qty).toLocaleString()}</span>
            </div>`;
        });
        calculateTotalsOnly();
        localStorage.setItem('arkShopCart', JSON.stringify(cart));
    }

    function updateQuantity(name, change) {
        const idx = cart.findIndex(i => i.name === name);
        if (idx !== -1) {
            cart[idx].qty += change;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            renderCart();
        }
    }

    function handleManualQty(name, newQty, input) {
        const idx = cart.findIndex(i => i.name === name);
        if (idx !== -1) {
            const val = parseInt(newQty);
            cart[idx].qty = isNaN(val) ? 0 : val;
            const row = input.closest('.cart-row');
            row.querySelector('.item-price-display').innerText = (cart[idx].qty * cart[idx].price).toLocaleString();
            localStorage.setItem('arkShopCart', JSON.stringify(cart));
            calculateTotalsOnly();
        }
    }

    function calculateTotalsOnly() {
        let total = 0;
        cart.forEach(i => total += (i.price * i.qty));
        const ingDisplay = document.getElementById('totalIng');
        if (ingDisplay) ingDisplay.innerText = total.toLocaleString();
    }

    function clearCart() { cart = []; renderCart(); }

    function copyHudTicket() {
        if (cart.length === 0) return alert("Cart is empty!");
        
        let summary = "--- NIGHTSHADE SHOP ORDER ---\n";
        cart.forEach(i => { 
            if(i.qty > 0) summary += `${i.qty}x ${i.name} (${(i.price * i.qty).toLocaleString()} Ingots)\n`; 
        });

        // Pulling only the Ingot number from the screen
        const ingTotal = document.getElementById('totalIng').innerText;
        summary += `\nTOTAL COST: ${ingTotal} Metal Ingots`;

        navigator.clipboard.writeText(summary).then(() => alert("Order copied!"));
    }

    window.addEventListener('load', renderCart);
    function toggleHud() {
    const hud = document.getElementById('shop-hud');
    const btn = document.getElementById('hud-toggle');
    
    // Switch the 'collapsed' class on or off
    hud.classList.toggle('collapsed');
    
    // Change the button symbol
    if (hud.classList.contains('collapsed')) {
        btn.innerText = '+';
    } else {
        btn.innerText = '−';
    }
}

document.addEventListener('click', (e) => {
    const card = e.target.closest('.dino-card') || e.target.closest('.item-card');
    
    // Safety check: Don't trigger if they clicked inside the HUD or on the dropdown itself
    if (card && !e.target.closest('#shop-hud')) {
        const nameEl = card.querySelector('h3') || card.querySelector('h2');
        const priceEl = card.querySelector('.price');
        
        if (nameEl && priceEl) {
            const baseName = nameEl.innerText.trim();
            const basePrice = Number(priceEl.innerText.replace(/[^0-9.]/g, ''));
            
            const variantPicker = document.getElementById('variant-master');
            const extraPrice = Number(variantPicker.value);
            
            // This safely extracts the word ("Tek", "Proto", "Original")
            const variantText = variantPicker.options[variantPicker.selectedIndex].text.split(' (')[0];

            // FIX: If it's "Original", match it EXACTLY with the base name so it doesn't duplicate
            const fullName = (variantText === "Original" || variantText === "Original (Base Price)") ? baseName : `${variantText} ${baseName}`;
            const finalPrice = basePrice + extraPrice;

            const index = cart.findIndex(i => i.name === fullName);
            if (index !== -1) { 
                cart[index].qty += 1; 
            } else { 
                cart.push({ name: fullName, price: finalPrice, qty: 1 }); 
            }
            
            renderCart();
        }
    }
});

</script>

</body>
</html>
