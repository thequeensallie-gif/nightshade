<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nightshade Ark Shop</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* HUD STYLING */
        #shop-hud { position: fixed; bottom: 20px; right: 20px; width: 340px; background: rgba(10, 10, 10, 0.98); border: 2px solid #00ffcc; border-radius: 12px; padding: 15px; z-index: 10000; color: white; box-shadow: 0 0 25px rgba(0, 255, 204, 0.4); font-family: sans-serif; }
        .hud-header { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .clear-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        #cart-items-list { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .item-controls { display: flex; align-items: center; gap: 5px; }
        .qty-input { width: 50px; background: #000; border: 1px solid #444; color: #00ffcc; text-align: center; border-radius: 4px; padding: 4px 0; font-weight: bold; font-size: 13px; }
        .qty-input:focus { border-color: #00ffcc; outline: none; }
        .qty-btn { background: #222; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 4px; width: 24px; height: 24px; cursor: pointer; font-weight: bold; }
        .qty-btn:hover { background: #00ffcc; color: #000; }
        .item-name { font-size: 13px; flex-grow: 1; margin-left: 10px; color: #eee; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-price-display { font-size: 13px; color: #00ffcc; font-weight: bold; margin-left: 5px; min-width: 60px; text-align: right; }
        .grand-total-section { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; margin-bottom: 12px; border-top: 1px solid #333; }
        .total-line { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .total-line b { color: #00ffcc; font-size: 1.1em; }
        .hud-copy-btn { width: 100%; background: #00ffcc; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>

<body>

<nav class="navbar">
    <a href="index.html" class="logo">
        <img src="images/logo-transparent.png" alt="Nightshade Logo">
    </a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="rules.html">Rules</a></li>
    </ul>
</nav>

<header class="shop-header">
    <h1>Nightshade Ark Shop</h1>
</header>

<section class="shop-tabs">
    <a href="free-starter-kit.html">Starter Kit</a>
    <a href="herbivores.html">Herbivores</a>
    <a href="omnivores.html">Omnivores</a>
    <a href="carnivores.html">Carnivores</a>
    <a href="utility-special.html">Utility</a>
</section>

<section class="shop-section">
    <h2>How to Purchase</h2>
    <div class="info-card center">
        <p>Go to Discord → <strong>#shop-ticket</strong> channel.</p>
        <a href="https://discord.gg/8NeNgTQu6d" class="discord-button">Go to Discord</a>
    </div>
</section>

<div id="shop-hud">
    <div class="hud-header">
        <span>YOUR ORDER</span>
        <button onclick="clearCart()" class="clear-btn">Clear All</button>
    </div>
    <div id="cart-items-list"></div>
    <div class="hud-footer">
        <div class="grand-total-section">
            <div class="total-line"><span>Total Resources:</span><b id="totalRes">0</b></div>
            <div class="total-line"><span>Total Metal Ingots:</span><b id="totalIng">0</b></div>
        </div>
        <button onclick="copyHudTicket()" class="hud-copy-btn">COPY ORDER FOR DISCORD</button>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('arkShopCart')) || [];

    // Helper to refresh HUD
    function renderCart() {
        const listContainer = document.getElementById('cart-items-list');
        if (!listContainer) return;
        listContainer.innerHTML = '';

        if (cart.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:#555; font-size:12px; margin-top:10px;">Select items to begin</p>';
        }

        cart.forEach((item) => {
            listContainer.innerHTML += `
                <div class="cart-row">
                    <div class="item-controls">
                        <button class="qty-btn" onclick="updateQuantity('${item.name}', -1)">-</button>
                        <input type="number" class="qty-input" value="${item.qty}" 
                               oninput="handleManualQty('${item.name}', this.value, this)">
                        <button class="qty-btn" onclick="updateQuantity('${item.name}', 1)">+</button>
                    </div>
                    <span class="item-name">${item.name}</span>
                    <span class="item-price-display">${(item.price * item.qty).toLocaleString()}</span>
                </div>`;
        });
        calculateTotalsOnly();
        localStorage.setItem('arkShopCart', JSON.stringify(cart));
    }

    function updateQuantity(name, change) {
        const index = cart.findIndex(item => item.name === name);
        if (index !== -1) {
            cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            renderCart();
        }
    }

    function handleManualQty(name, newQty, inputElement) {
        const index = cart.findIndex(item => item.name === name);
        if (index !== -1) {
            const val = parseInt(newQty);
            cart[index].qty = isNaN(val) ? 0 : val;
            
            // Fast UI update for the specific row
            const row = inputElement.closest('.cart-row');
            const priceDisplay = row.querySelector('.item-price-display');
            priceDisplay.innerText = (cart[index].qty * cart[index].price).toLocaleString();

            localStorage.setItem('arkShopCart', JSON.stringify(cart));
            calculateTotalsOnly();
        }
    }

    function calculateTotalsOnly() {
        let totalIngots = 0;
        cart.forEach(item => totalIngots += (item.price * item.qty));
        const totalRes = totalIngots * 20;
        
        document.getElementById('totalIng').innerText = totalIngots.toLocaleString();
        document.getElementById('totalRes').innerText = totalRes.toLocaleString();
    }

    function clearCart() {
        cart = [];
        renderCart();
    }

    function copyHudTicket() {
        if (cart.length === 0) return alert("Cart is empty!");
        let summary = "--- NIGHTSHADE SHOP ORDER ---\n";
        cart.forEach(item => { 
            if(item.qty > 0) summary += `${item.qty}x ${item.name} (${(item.price * item.qty).toLocaleString()} Ingots)\n`; 
        });
        summary += `\nTOTAL: ${document.getElementById('totalRes').innerText} Resources -> ${document.getElementById('totalIng').innerText} Ingots`;
        navigator.clipboard.writeText(summary).then(() => alert("Order copied!"));
    }

    window.addEventListener('load', renderCart);
</script>

</body>
</html>
